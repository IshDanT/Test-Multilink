<!DOCTYPE html>
<html>
<head>
    <title>My Random Link</title>
</head>
<body>
    <h1>Welcome!</h1>
    <p>Click the button below to go to a random site.</p>
    
    <button onclick="goToRandom()">Take me somewhere!</button>

    <script>
        function goToRandom() {
            const sites = [
                "https://docs.google.com/forms/d/e/1FAIpQLSfMiDG3yYsWzr2L16fgf1vTMhp4lQdWz3J-oeEnlNsvZ9syxw/viewform?usp=publish-editor",
                "https://docs.google.com/forms/d/e/1FAIpQLSeAuoEv4bggOVW_fbspZXyBix24ZYiReOnZeKvIHgCfsCicQA/viewform?usp=publish-editor",
                "https://docs.google.com/forms/d/e/1FAIpQLSejyPpkYdblL5oZ6VJFdRHXRcoCcn3fTvpTYxJVpIl4hHgr1g/viewform?usp=publish-editor"
            ];
            const randomIndex = Math.floor(Math.random() * sites.length);
            window.location.href = sites[randomIndex];
        }
    </script>
</body>
</html>
