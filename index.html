<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research Participation Portal</title>
    <style>
        /* 1. NEW: This prevents padding from stretching the card's width */
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffffff;
            height: 100vh; /* If it still jumps on mobile scroll, change this to: min-height: 100dvh; */
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            color: #1f6117; 
        }

        .card {
            background: #ffffff;
            padding: 3rem; 
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(34, 139, 34, 0.1); 
            border: 1px solid #e0e0e0;
            text-align: center;
            max-width: 450px;
            width: 90%;
        }

        h1 {
            color: #1f6117; 
            font-weight: 600;
            margin-bottom: 15px;
        }

        p {
            color: #4a5d50;
            margin-bottom: 30px;
            font-size: 1.1rem;
            line-height: 1.6;
        }

        button {
            background-color: #1f6117; 
            color: #ffffff;
            border: none;
            padding: 16px 35px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(34, 139, 34, 0.2);
        }

        button:hover:not(:disabled) {
            background-color: #2eaf2e; 
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(34, 139, 34, 0.3);
        }

        button:disabled {
            background-color: #cccccc;
            color: #666666;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* 2. NEW: Mobile-specific adjustments */
        @media (max-width: 480px) {
            .card {
                padding: 1.5rem; /* Half the padding so text has room to breathe */
                width: 95%; /* Let it take up a bit more screen width */
            }

            h1 {
                font-size: 1.5rem; /* Slightly smaller title */
            }

            p {
                font-size: 1rem; /* Slightly smaller text */
                margin-bottom: 20px;
            }

            button {
                padding: 14px 28px; /* Slightly smaller button */
                width: 100%; /* Makes the button easy to tap with a thumb */
            }
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Research Portal</h1>
        <p>You will be taken to a google form. Please note that you may only participate in this study once.</p>
        
        <button id="surveyButton" onclick="goToAssignedGroup()">Open Form</button>
    </div>

    <script>
        // Check if user has already participated when the page loads
        window.onload = function() {
            if (localStorage.getItem("hasParticipated") === "true") {
                const btn = document.getElementById("surveyButton");
                btn.disabled = true;
                btn.innerText = "Access Used";
            }
        };

        function goToAssignedGroup() {
            const btn = document.getElementById("surveyButton");
            
            // Mark user as participated in their local browser
            localStorage.setItem("hasParticipated", "true");
            
            // Update button UI
            btn.disabled = true;
            btn.innerText = "Assigning Group...";

            // PASTE YOUR GOOGLE SCRIPT URL HERE
            const googleWebAppUrl = "https://script.google.com/macros/s/AKfycbyoQBXi6J8WRRfaG2Zf_Dd6FApJHIwLw0p3R9Vi-iiWXLPI_dNQWtCla1I1Ja9I1Abmkw/exec"; 
            
            // Add a slight delay for UI transition, then redirect to the backend script
            setTimeout(() => {
                window.location.href = googleWebAppUrl;
            }, 400);
        }
    </script>
</body>
</html>
