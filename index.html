<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research Participation Portal</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffffff;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            color: #1f6117; 
        }

        .card {
            background: #ffffff;
            padding: 3rem; 
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(34, 139, 34, 0.1); 
            border: 1px solid #e0e0e0;
            text-align: center;
            max-width: 450px;
            width: 90%;
        }

        h1 {
            color: #1f6117; 
            font-weight: 600;
            margin-bottom: 15px;
        }

        p {
            color: #4a5d50;
            margin-bottom: 30px;
            font-size: 1.1rem;
            line-height: 1.6;
        }

        button {
            background-color: #1f6117; 
            color: #ffffff;
            border: none;
            padding: 16px 35px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(34, 139, 34, 0.2);
        }

        button:hover {
            background-color: #2eaf2e; 
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(34, 139, 34, 0.3);
        }

        @media (max-width: 480px) {
            .card { padding: 1.5rem; width: 95%; }
            h1 { font-size: 1.5rem; }
            p { font-size: 1rem; margin-bottom: 20px; }
            button { padding: 14px 28px; width: 100%; }
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Research Portal</h1>
        <p>Click below to be assigned to a research group. You will be redirected to a Google Form.</p>
        
        <button id="surveyButton" onclick="goToAssignedGroup()">Open Form</button>
    </div>

    <script>
        function goToAssignedGroup() {
            const btn = document.getElementById("surveyButton");
            
            // Visual feedback that the click worked
            btn.innerText = "Redirecting...";
            btn.style.opacity = "0.7";

            // Your Web App URL
            const googleWebAppUrl = "https://script.google.com/macros/s/AKfycbwTGWQhkoFH7Y1NCmLwCx6DCAOYs6XjcRhmpg1SWKWAnFwq7SxotTGTuh5XR0bhGJc7gg/exec"; 
            
            // Small delay for UX then redirect
            setTimeout(() => {
                window.location.href = googleWebAppUrl;
            }, 300);

            // Reset button text in case user hits 'Back' button
            setTimeout(() => {
                btn.innerText = "Open Form";
                btn.style.opacity = "1";
            }, 3000);
        }
    </script>
</body>
</html>
