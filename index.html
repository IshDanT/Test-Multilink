<!DOCTYPE html>
<html>
<head>
    <title>My Random Link</title>
</head>
<body>
    <h1>Welcome!</h1>
    <p>Click the button below to go to a random site.</p>
    
    <button onclick="goToRandom()">Take me somewhere!</button>

    <script>
        function goToRandom() {
            const sites = [
                "https://google.com",
                "https://bing.com",
                "https://duckduckgo.com"
            ];
            const randomIndex = Math.floor(Math.random() * sites.length);
            window.location.href = sites[randomIndex];
        }
    </script>
</body>
</html>
